<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Copy Tabs</title>
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 12px; width: 340px; }
      button { width: 100%; padding: 10px; margin: 6px 0; }
      #status { margin-top: 8px; font-size: 12px; line-height: 1.3; white-space: pre-wrap; }
      label { display: block; margin-top: 8px; font-size: 12px; }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      .row > * { flex: 1; }
      .box { border-top: 1px solid #ddd; margin-top: 10px; padding-top: 10px; }
      select { width: 100%; padding: 8px; }
      input[type="file"] { width: 100%; }
    </style>
  </head>
  <body>
    <button id="copy">Copy URLs</button>
    <button id="export">Export URLs to .txt</button>

    <label>
      <input id="includeTitles" type="checkbox" />
      Include titles (Title + URL)
    </label>

    <div class="box">
      <label for="openMode"><b>Import behavior</b></label>
      <select id="openMode">
        <option value="newWindow" selected>Open in NEW window</option>
        <option value="currentWindow">Open in CURRENT window</option>
      </select>

      <label for="pasteBox"><b>Paste URLs</b> (one per line)</label>
      <textarea id="pasteBox" rows="6" style="width:100%; padding:8px; box-sizing:border-box;"></textarea>
      <button id="importPasted">Import Pasted URLs</button>

      <label for="fileInput">Import URLs from .txt file (one URL per line)</label>
      <input id="fileInput" type="file" accept=".txt,text/plain" />
      <button id="importFile">Import from Selected File</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
